[build]
  command = "npm run build"
  publish = ".next"


[build.environment]
  NODE_VERSION = "20"

[[plugins]]
  package = "@netlify/plugin-nextjs"

# NOTE: The @netlify/plugin-nextjs plugin auto-generates all routing
# (static, SSR, and /_next/image). A wildcard SPA-fallback redirect like
# `from = "/*" to = "/index.html"` was previously here and silently broke
# Next.js image optimization — every /_next/image request matched the
# wildcard, bypassed the optimizer, and returned the original Supabase
# upstream image unchanged (1.76 MB instead of the requested 256w/640w
# variant). Don't add SPA-fallback rewrites in this file.

# Cache static assets
[[headers]]
  for = "/_next/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

# Edge Functions
[[edge_functions]]
  function = "contact-geo"
  path = "/contact"

# CORS headers for embed files
[[headers]]
  for = "/embed/*"
  [headers.values]
    Access-Control-Allow-Origin = "*"
    Access-Control-Allow-Methods = "GET, OPTIONS"
    Access-Control-Allow-Headers = "Content-Type"
    Cache-Control = "public, max-age=3600, stale-while-revalidate=86400"
    X-Content-Type-Options = "nosniff"

# Specific caching for embed JS files
[[headers]]
  for = "/embed/*.js"
  [headers.values]
    Content-Type = "application/javascript; charset=utf-8"
    Cache-Control = "public, max-age=3600"
    Access-Control-Allow-Origin = "*"

# Specific caching for embed CSS files
[[headers]]
  for = "/embed/*.css"
  [headers.values]
    Content-Type = "text/css; charset=utf-8"
    Cache-Control = "public, max-age=3600"
    Access-Control-Allow-Origin = "*"
